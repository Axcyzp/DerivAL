      <path d="M210 18L241.1 101.8L329.7 108.7L261.4 165.4L283.2 251.8L210 203.3L136.8 251.8L158.6 165.4L90.3 108.7L178.9 101.8L210 18Z" fill="url(#markGradient)"/>
      <path d="M210 48.4L234.3 113.6L303.2 119L250 163.1L267 230.4L210 192.7L153 230.4L170 163.1L116.8 119L185.7 113.6L210 48.4Z" fill="#050508" fill-opacity="0.88"/>


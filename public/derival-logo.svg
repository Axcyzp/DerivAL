    <g transform="skewX(-7)">
      <text x="345" y="221" font-family="Satoshi, Inter, Avenir Next, Segoe UI, Arial, sans-serif" font-size="124" font-weight="860" letter-spacing="-9"><tspan fill="url(#wordGradient)">Deriv</tspan><tspan fill="url(#accentGradient)">AL</tspan></text>

      <g filter="url(#neonBlur)" opacity="0.62">
        <path d="M210 18L241.1 101.8L329.7 108.7L261.4 165.4L283.2 251.8L210 203.3L136.8 251.8L158.6 165.4L90.3 108.7L178.9 101.8L210 18Z" fill="#8B2FFF"/>
